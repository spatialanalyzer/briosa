syntax = "proto3";

package briosa.sa.v2026_1_0529_7.v1alpha1;

option csharp_namespace = "Briosa.Sa.V2026_1_0529_7.V1Alpha1";

// Identifies a point by the three name components used by this exact
// SpatialAnalyzer target. It is not a Cartesian coordinate.
message PointName {
  optional string collection_name = 1;
  optional string group_name = 2;
  optional string target_name = 3;
}

// Carries three numeric components. The owning target-scoped command field
// determines whether they represent coordinates, a direction, weights, or
// another SpatialAnalyzer concept.
message Vector3 {
  optional double x = 1;
  optional double y = 2;
  optional double z = 3;
}

// Preserves both the enable flag and numeric value returned by SpatialAnalyzer.
// A disabled limit is present and is not equivalent to an absent limit.
message ToleranceLimit {
  optional bool enabled = 1;
  optional double value = 2;
}

// Preserves the complete vector-tolerance shape for this exact target.
message ToleranceVectorOptions {
  ToleranceLimit high_x = 1;
  ToleranceLimit high_y = 2;
  ToleranceLimit high_z = 3;
  ToleranceLimit high_magnitude = 4;
  ToleranceLimit low_x = 5;
  ToleranceLimit low_y = 6;
  ToleranceLimit low_z = 7;
  ToleranceLimit low_magnitude = 8;
}
