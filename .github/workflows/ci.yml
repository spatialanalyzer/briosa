name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Windows x64 build and test
    runs-on: windows-latest
    timeout-minutes: 15

    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_NOLOGO: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Buf
        uses: bufbuild/buf-setup-action@v1.50.0
        with:
          version: 1.72.0

      - name: Verify protobuf schemas
        shell: pwsh
        run: ./eng/Verify-Protocol.ps1

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore locked dependencies
        run: dotnet restore Briosa.slnx --locked-mode

      - name: Build interop verifier
        run: dotnet build tools/Briosa.Generator/Briosa.Generator.csproj -c Release --no-restore

      - name: Verify command catalog
        shell: pwsh
        run: ./eng/Verify-Catalog.ps1 -NoBuild

      - name: Verify committed interop metadata
        shell: pwsh
        run: ./eng/Verify-InteropArtifacts.ps1 -NoBuild

      - name: Build solution
        run: dotnet build Briosa.slnx -c Release --no-restore

      - name: Run tests
        run: dotnet test Briosa.slnx -c Release --no-build --no-restore
